<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>Тест-тренажёр </title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="row">
  <h2>Тест-тренажёр</h2>
  <button id="themeToggle">🌙/☀️</button>
</div>

<div class="panel row">
  <label>Тема:
    <select id="topicSelect"></select>
  </label>
</div>

<div class="spacer"></div>

<div class="panel row">
  <label>С: <input id="rangeStart" type="number" min="1" value="1"></label>
  <label>По: <input id="rangeEnd" type="number" min="1" value="1"></label>
  <label><input id="shuffle" type="checkbox"> Перемешать</label>
  <label><input id="hideVariants" type="checkbox"> Скрыть количество вариантов</label>
  <button id="startBtn">Начать</button>
  <button id="wrongOnlyBtn" disabled>Ошибочные → новый прогон</button>
  <span class="pill">Шаг: <span id="stepInfo">—/—</span></span>
  <span class="pill">Ошибок: <span id="wrongCount">0</span></span>
</div>

<div class="spacer"></div>

<div class="panel">
  <div id="question">Выберите тему</div>
  <textarea id="answerInput" placeholder="Ваш ответ..."></textarea>
  <div id="answerContainer"></div>


  <div class="row">
    <button id="checkBtn" disabled>Показать ответ</button>
    <button id="markRightBtn" disabled>Верно</button>
    <button id="markWrongBtn" disabled>Неверно</button>
  </div>

  <div class="spacer"></div>
  <div id="resultBox"></div>
  <div id="correctBox"></div>

  <div class="spacer"></div>
  <div class="row">
    <button id="prevBtn" disabled>Назад</button>
    <button id="nextBtn" disabled>Вперёд</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>
<script src="app.js"></script>
</body>
</html>
