<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>МедТест</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ===== LOADING SCREEN ===== -->
<div id="loadingScreen" class="screen-center">
  <p class="auth-hint loading-dots">Загрузка</p>
</div>

<!-- ===== AUTH SCREEN ===== -->
<div id="authScreen" class="screen-center" style="display:none">
  <div class="auth-card panel">
    <h2 class="auth-title brand-title">Мед<span class="brand-accent">Тест</span></h2>
    <div id="authForm">
      <div class="auth-tabs row">
        <button id="tabSignIn" class="tab-btn tab-active">Вход</button>
        <button id="tabSignUp" class="tab-btn">Регистрация</button>
      </div>
      <div id="authError" class="auth-msg auth-msg--error" style="display:none"></div>
      <label class="auth-label">Email
        <input id="authEmail" class="auth-input" type="email" autocomplete="email" placeholder="you@example.com">
      </label>
      <label class="auth-label">Пароль
        <div class="auth-input-wrap">
          <input id="authPassword" class="auth-input" type="password" autocomplete="current-password" placeholder="••••••••">
          <button type="button" id="passwordToggle" class="password-toggle" aria-label="Показать пароль"><i data-lucide="eye"></i></button>
        </div>
      </label>
      <p id="passwordHint" class="auth-hint" style="display:none">Минимум 6 символов</p>
      <button id="authSubmitBtn" class="auth-btn">Войти</button>
    </div>
    <div id="confirmNotice" style="display:none">
      <div id="confirmText" class="auth-msg auth-msg--info"></div>
      <button id="backToSignIn" class="auth-btn">Назад ко входу</button>
    </div>
  </div>
</div>

<!-- ===== ACTIVATION SCREEN ===== -->
<div id="activationScreen" class="screen-center" style="display:none">
  <div class="auth-card panel">
    <div class="activation-icon"><i data-lucide="lock"></i></div>
    <h2 class="auth-title brand-title">Мед<span class="brand-accent">Тест</span></h2>
    <p class="auth-subtitle">Активация доступа</p>
    <p id="activationHint" class="auth-hint">Введите код активации, чтобы получить доступ к тренажёру.</p>
    <div id="activationError" class="auth-msg auth-msg--error" style="display:none"></div>
    <label class="auth-label">Код активации
      <input id="codeInput" class="auth-input" type="text" placeholder="XXXX-XXXX">
    </label>
    <button id="activateBtn" class="auth-btn">Активировать</button>
    <button id="signOutFromActivation" class="btn-link">Выйти из аккаунта</button>
  </div>
</div>

<!-- ===== APP SCREEN ===== -->
<div id="appScreen" style="display:none">

<div class="row app-header">
  <h2 class="brand-title">Мед<span class="brand-accent">Тест</span></h2>
  <button id="themeToggle" class="btn-icon" aria-label="Переключить тему"><i data-lucide="moon"></i></button>
  <span id="accessPill" class="pill access-pill" style="display:none"></span>
  <button id="signOutBtn" class="btn-outline"><i data-lucide="log-out"></i> Выйти</button>
</div>

<div class="panel row">
  <label>Тема:
    <select id="topicSelect"></select>
  </label>
</div>

<div class="spacer"></div>

<div class="panel controls-panel">
  <div class="row controls-setup">
    <label>С: <input id="rangeStart" type="number" min="1" value="1"></label>
    <label>По: <input id="rangeEnd" type="number" min="1" value="1"></label>
    <label><input id="shuffle" type="checkbox"> <i data-lucide="shuffle"></i> Перемешать</label>
    <label><input id="hideVariants" type="checkbox"> Скрыть количество вариантов</label>
    <button id="startBtn" class="btn-primary">Начать</button>
  </div>
  <div id="rangeError" class="range-error" style="display:none"></div>
  <div class="row controls-status">
    <span class="pill">Шаг: <span id="stepInfo">—/—</span></span>
    <span class="pill">Ошибок: <span id="wrongCount">0</span></span>
    <button id="wrongOnlyBtn" disabled>Ошибочные → новый прогон</button>
  </div>
</div>

<div class="spacer"></div>

<div class="panel">
  <div id="question">Выберите тему</div>
  <div id="firstRunHint" class="first-run-hint" style="display:none">
    <span>1.&nbsp;Выберите тему</span>
    <span class="first-run-sep">→</span>
    <span>2.&nbsp;Настройте диапазон (С&nbsp;/&nbsp;По)</span>
    <span class="first-run-sep">→</span>
    <span>3.&nbsp;Нажмите <strong>«Начать»</strong></span>
  </div>
  <textarea id="answerInput" placeholder="Ваш ответ..."></textarea>
  <div id="answerContainer"></div>

  <div class="row">
    <button id="checkBtn" class="btn-primary" disabled>Показать ответ</button>
    <button id="markRightBtn" disabled>Верно</button>
    <button id="markWrongBtn" disabled>Неверно</button>
  </div>

  <div class="spacer"></div>
  <div id="resultBox"></div>
  <div id="correctBox"></div>

  <div class="spacer"></div>
  <div class="row">
    <button id="prevBtn" class="btn-outline" disabled><i data-lucide="chevron-left"></i> Назад</button>
    <button id="nextBtn" class="btn-outline" disabled>Вперёд <i data-lucide="chevron-right"></i></button>
  </div>
</div>

</div><!-- /#appScreen -->

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<script src="auth.js"></script>
<script src="app.js"></script>
</body>
</html>
